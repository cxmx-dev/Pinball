<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Neon Nexus Pinball</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #1a1030 0%, #050208 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', monospace;
      touch-action: none;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    #stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      max-width: 100%;
      max-height: 100%;
    }
    #game-wrap {
      position: relative;
      filter: drop-shadow(0 0 40px rgba(80, 120, 255, 0.25))
              drop-shadow(0 20px 60px rgba(0, 0, 0, 0.8));
      line-height: 0;
    }
    #pinball-canvas {
      display: block;
      border-radius: 8px;
      background: #0a0612;
      max-width: 100%;
      height: auto;
    }
    .vignette {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
      z-index: 1;
    }
    #touch-ui {
      display: none;
      width: min(520px, 96vw);
      gap: 8px;
      z-index: 5;
      padding: 0 4px 4px;
    }
    html.input-touch #touch-ui,
    html.device-phone #touch-ui,
    html.device-tablet #touch-ui {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
    }
    #touch-ui button {
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 700;
      color: #e0e8ff;
      background: rgba(12, 10, 28, 0.9);
      border: 1px solid rgba(120, 140, 255, 0.4);
      border-radius: 10px;
      min-height: 48px;
      padding: 8px 4px;
      -webkit-tap-highlight-color: transparent;
    }
    #touch-ui button:active,
    #touch-ui button.held {
      background: rgba(100, 120, 255, 0.35);
      border-color: #a8b4ff;
      color: #fff;
    }
    #touch-hint {
      display: none;
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(200, 210, 255, 0.55);
      pointer-events: none;
      white-space: nowrap;
    }
    html.input-touch #touch-hint { display: block; }
  </style>
</head>
<body oncontextmenu="return false">
  <div id="touch-hint">Tap left / right of table for flippers</div>
  <div id="stage">
    <div id="game-wrap">
      <canvas id="pinball-canvas" width="520" height="980"></canvas>
    </div>
    <div id="touch-ui" aria-label="Touch controls">
      <button type="button" id="btn-left" data-flip="left">Left</button>
      <button type="button" id="btn-launch" data-action="launch">Launch</button>
      <button type="button" id="btn-tilt" data-action="tilt">Tilt / R</button>
      <button type="button" id="btn-right" data-flip="right">Right</button>
    </div>
  </div>
  <div class="vignette"></div>
  <script src="device.js"></script>
  <script src="simulation.js"></script>
  <script src="renderer.js"></script>
  <script src="audio.js"></script>
  <script src="game.js"></script>
</body>
</html>
